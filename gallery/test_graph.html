<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.9.0/d3.min.js"></script>
<style>
  body { margin: 0; background: #111; }
  svg { width: 100vw; height: 100vh; }
  .link { stroke: #444; stroke-width: 1; }
  .link.hl { stroke: #c8f064; stroke-width: 2; }
  .link.dim { stroke: #222; }
  circle.artwork { fill: #e8e4dc; }
  circle.artwork.hl { fill: #c8f064; }
  circle.artwork.dim { fill: #333; }
  circle.tag { fill: #3a3a3a; stroke: #666; stroke-width: 1; }
  circle.tag.hl { stroke: #c8f064; }
  circle.tag.dim { fill: #1a1a1a; stroke: #2a2a2a; }
  text { fill: #666; font: 9px monospace; pointer-events: none; }
  text.dim { fill: #2a2a2a; }
  text.hl { fill: #c8f064; }
  #info { position: fixed; top: 10px; left: 10px; color: #c8f064; font: 11px monospace; }
</style>
</head>
<body>
<div id="info">click a node</div>
<svg id="graph"></svg>
<script>
// ダミーデータ
const nodes = [
  { id: 'art1', type: 'artwork', tags: ['tagA','tagB'] },
  { id: 'art2', type: 'artwork', tags: ['tagA','tagC'] },
  { id: 'art3', type: 'artwork', tags: ['tagB','tagC'] },
  { id: 'art4', type: 'artwork', tags: ['tagA'] },
  { id: 'art5', type: 'artwork', tags: ['tagC','tagD'] },
  { id: 'tagA', type: 'tag', label: 'tagA', count: 3 },
  { id: 'tagB', type: 'tag', label: 'tagB', count: 2 },
  { id: 'tagC', type: 'tag', label: 'tagC', count: 3 },
  { id: 'tagD', type: 'tag', label: 'tagD', count: 1 },
];
const links = [
  { source: 'art1', target: 'tagA' },
  { source: 'art1', target: 'tagB' },
  { source: 'art2', target: 'tagA' },
  { source: 'art2', target: 'tagC' },
  { source: 'art3', target: 'tagB' },
  { source: 'art3', target: 'tagC' },
  { source: 'art4', target: 'tagA' },
  { source: 'art5', target: 'tagC' },
  { source: 'art5', target: 'tagD' },
];

const svg = d3.select('#graph');
const width = window.innerWidth;
const height = window.innerHeight;

// ズーム用のgを1つだけ作る
const g = svg.append('g');

// ズーム設定
const zoom = d3.zoom()
  .scaleExtent([0.2, 4])
  .on('zoom', e => g.attr('transform', e.transform));
svg.call(zoom);

// レイヤー: lLinkDim → lLinkHL → lNodeDim → lNodeHL
const lLinkDim = g.append('g');
const lLinkHL  = g.append('g');
const lNodeDim = g.append('g');
const lNodeHL  = g.append('g');

// ドラッグ（ズーム変換を考慮）
const drag = d3.drag()
  .on('start', (e, d) => {
    if (!e.active) sim.alphaTarget(0.3).restart();
    d.fx = d.x; d.fy = d.y;
  })
  .on('drag', (e, d) => {
    d.fx = e.x; d.fy = e.y;
  })
  .on('end', (e, d) => {
    if (!e.active) sim.alphaTarget(0);
    d.fx = null; d.fy = null;
  });

// 全リンクをlLinkHLに描画
const linkSel = lLinkHL.selectAll('line')
  .data(links).join('line').attr('class', 'link');

// 全ノードをlNodeHLに描画
const nodeSel = lNodeHL.selectAll('g')
  .data(nodes).join('g')
  .call(drag);

nodeSel.filter(d => d.type === 'artwork')
  .append('circle').attr('r', 6).attr('class', 'artwork');

const tagG = nodeSel.filter(d => d.type === 'tag');
tagG.append('circle')
  .attr('r', d => 8 + d.count * 2)
  .attr('class', 'tag');
tagG.append('text')
  .attr('dy', d => -(8 + d.count * 2 + 3))
  .attr('text-anchor', 'middle')
  .text(d => d.label);

// クリック
nodeSel.on('click', (e, d) => {
  e.stopPropagation();
  document.getElementById('info').textContent = `clicked: ${d.id}`;
  applyHL(d);
});
svg.on('click', () => {
  document.getElementById('info').textContent = 'click a node';
  resetHL();
});

// シミュレーション
const sim = d3.forceSimulation(nodes)
  .force('link', d3.forceLink(links).id(d => d.id).distance(60))
  .force('charge', d3.forceManyBody().strength(-120))
  .force('center', d3.forceCenter(width / 2, height / 2))
  .on('tick', () => {
    [lLinkHL, lLinkDim].forEach(l =>
      l.selectAll('line')
        .attr('x1', d => d.source.x).attr('y1', d => d.source.y)
        .attr('x2', d => d.target.x).attr('y2', d => d.target.y)
    );
    [lNodeHL, lNodeDim].forEach(l =>
      l.selectAll('g').attr('transform', d => `translate(${d.x},${d.y})`)
    );
  });

function applyHL(d) {
  // HLするノードIDのセット
  const connectedIds = new Set(
    links.filter(l => l.source.id === d.id || l.target.id === d.id)
      .map(l => l.source.id === d.id ? l.target.id : l.source.id)
  );
  connectedIds.add(d.id);

  // ノードをlNodeHL/lNodeDimに振り分け
  // まずlNodeDimの全要素をlNodeHLに戻す
  Array.from(lNodeDim.node().children).forEach(el => lNodeHL.node().appendChild(el));
  // dimにすべきノードをlNodeDimへ
  Array.from(lNodeHL.node().children).forEach(el => {
    const nd = d3.select(el).datum();
    if (nd && !connectedIds.has(nd.id)) lNodeDim.node().appendChild(el);
  });

  // リンクを再描画
  lLinkHL.selectAll('*').remove();
  lLinkDim.selectAll('*').remove();
  links.forEach(l => {
    const isHL = l.source.id === d.id || l.target.id === d.id;
    (isHL ? lLinkHL : lLinkDim).append('line')
      .attr('class', 'link' + (isHL ? ' hl' : ' dim'))
      .attr('x1', l.source.x).attr('y1', l.source.y)
      .attr('x2', l.target.x).attr('y2', l.target.y)
      .datum(l);
  });

  // スタイル
  lNodeDim.selectAll('circle.artwork').attr('class', 'artwork dim');
  lNodeDim.selectAll('circle.tag').attr('class', 'tag dim');
  lNodeDim.selectAll('text').attr('class', 'dim');
  lNodeHL.selectAll('circle.artwork').attr('class', 'artwork hl');
  lNodeHL.selectAll('circle.tag').attr('class', 'tag hl');
}

function resetHL() {
  Array.from(lNodeDim.node().children).forEach(el => lNodeHL.node().appendChild(el));
  lLinkDim.selectAll('*').remove();
  lLinkHL.selectAll('*').remove();
  lLinkHL.selectAll('line').data(links).join('line').attr('class', 'link');
  lNodeHL.selectAll('circle.artwork, circle.artwork.hl, circle.artwork.dim')
    .attr('class', 'artwork');
  lNodeHL.selectAll('circle.tag, circle.tag.hl, circle.tag.dim')
    .attr('class', 'tag');
  lNodeHL.selectAll('text').attr('class', '');
}
</script>
</body>
</html>
