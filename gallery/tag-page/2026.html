<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/1column.css">
    <script src="/js/jquery-3.6.0.min.js"></script>
    <script src="/js/main.js"></script>
    <script src="/js/mouse.js" defer></script>  
    <title>#2026 - 100%health</title>
    <link rel="stylesheet" href="tag-system.css">
    <style>
        .year_nav {
            margin-top: 10px;
            margin-bottom: 10px;
        }
        .year_nav_list {
            display: flex;
            gap: 10px;
            list-style: none;
            padding: 0;
            justify-content: space-between;
            text-decoration: none;
            li {
                color: #000;
                background-color: #ccc;
                a{
                    text-decoration: none;
                    &:hover {
                        color: #000;
                        background-color: #fff;
                    }
                }
                &:hover {
                    color: #000;
                    background-color: #fff;
                }
            }
        }
        .year_nav_prev a::before {
            content: "<<";
        }
        .year_nav_next a::after {
            content: ">>";
        }
    </style>
</head>

<body>
    <div id="wrapper">
        <header id="header">
            <div id="header-flex">
                <nav id="back" aria-label="戻るナビゲーション">
                    <a id="backicon" href="/index.html">
                        &lt;
                    </a>
                </nav>
                <nav id="address" class="addressbar" aria-label="パンくずナビゲーション">
                  <ol class="breadcrumb">
                    <li><a href="/index.html">100%health</a></li>
                    <li><a href="../gallery_main.html">gallery</a></li>
                    <li><a href="tags.html">tags</a></li>
                    <li aria-current="page"><a href="2026.html">2026</a></li>
                  </ol>
                </nav>
            </div>
        </header>
        <main id="main">
            <div id="galleryspace">
                <div class="tag-header">
                    <h1 class="title">#2026 の作品一覧</h1>
                    <nav class="year_nav" aria-label="年別ナビゲーション">
                        <ul class="year_nav_list">
                            <li class="year_nav_prev"><a href="2025.html">2025</a></li>
                            <li class="year_nav_next" style="color: #888;">--2027</li>
                        </ul>
                    </nav>
                    <div class="tag-controls">
                        <div class="filter-row">
                            <select id="sort-select" aria-label="並び替え">
                                <option value="date-desc">新しい順</option>
                                <option value="date-asc">古い順</option>
                                <option value="series">シリーズ別</option>
                            </select>
                            
                            <select id="series-filter" aria-label="シリーズ別">
                                <option value="">全シリーズ</option>
                                <!-- 動的生成 -->
                            </select>
                            
                            <select id="tag-filter" aria-label="追加タグ">
                                <option value="">追加タグなし</option>
                                <!-- 動的生成 -->
                            </select>
                            
                            <!-- リセットボタン -->
                            <button id="reset-filters" type="button" class="reset-btn">
                                リセット
                            </button>
                        </div>
                    </div>
                </div>
                <div id="works-container">
                    <div id="loading-indicator">
                        <p>♥ #2026 タグ付き作品を読み込み中 ♥</p>
                        <div class="progress-container">
                            <div class="progress-bar"></div>
                        </div>
                        <p id="loading-status">準備中...</p>
                    </div>
                </div>
                <footer class="year_nav">
                    <nav class="year_nav" aria-label="年別ナビゲーション">
                        <ul class="year_nav_list">
                            <li class="year_nav_prev"><a href="2025.html">2025</a></li>
                            <li class="year_nav_next" style="color: #888;">--2027</li>
                        </ul>
                    </nav>
                </footer>
            </div>
        </main>
        <footer id="main-footer">
            <!-- main.jsから#galleryhtmlへgallery.htmlの挿入 -->
            <div id="galleryhtml"></div>
            <!-- main.jsから#footerへfooter.htmlの挿入 -->
            <div id="footerhtml"></div>
        </footer>
        <div id="lightbox">
            <link rel="stylesheet" href="/luminous-basic.min.css" />
            <script src="/Luminous.min.js"></script>
        </div>
        <script src="tag-system.js"></script>
        <script>
            // ページ固有設定
            window.TagPageConfig = {
                targetTag: '2026',
                debug: false
            };
        </script>    
    </div>
</body>
</html>
